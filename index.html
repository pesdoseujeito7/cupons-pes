<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cupom PES do Seu Jeito</title>

<style>

body{
background:#111;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1b1b1b;
padding:40px;
border-radius:15px;
text-align:center;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#00c853;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="box">

<h1>PES do Seu Jeito</h1>

<p>Digite seu cupom</p>

<input type="text" id="cupom">

<button onclick="validar()">VALIDAR</button>

</div>

<script>

function validar(){

let cupom =
document.getElementById("cupom")
.value
.toUpperCase()
.trim();

const cupons = {

"FELIPE25":"https://pesdoseujeito.wixsite.com/pes-do-seu-jeito/compre",

"JOAO10":"https://nubank.com.br/cobranca/EO6JDxdzy194ptha",

"VIP15":"https://nubank.com.br/cobranca/MGHux0sHp194ptha"

};

if(cupons[cupom]){

window.location.href =
cupons[cupom];

}else{

alert("Cupom inválido!");

}

}

</script>

</body>
</html>
