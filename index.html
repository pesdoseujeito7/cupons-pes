<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validador de Cupons PES</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    color:#0d6efd;
}

.aviso{
    background:#fff3cd;
    border:1px solid #ffe69c;
    color:#664d03;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:left;
    font-size:14px;
    line-height:1.5;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b5ed7;
}

</style>

</head>
<body>

<h1>Cupom de Desconto</h1>

Não nos responsabilizamos por valores enviados incorretamente.
